name: Multi-platform container
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: runner-container-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: local/video-runner:test
      - name: Load and smoke-test architecture under QEMU
        run: |
          docker buildx build --platform '${{ matrix.platform }}' --load -t local/video-runner:${{ strategy.job-index }} .
          docker run --rm local/video-runner:${{ strategy.job-index }} --help
          docker run --rm --entrypoint ffmpeg local/video-runner:${{ strategy.job-index }} -version
