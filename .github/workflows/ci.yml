name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: runner-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: python -m pip install -e '.[dev]'
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src
      - name: Unit, integration, schema, CLI, and real synthetic media tests
        env:
          OPENAI_API_KEY: ""
          SUPERVISOR_TOKEN: ""
        run: pytest -q
      - run: video-runner --help && video-runner print-schedule-example

